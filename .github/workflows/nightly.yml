# ═══════════════════════════════════════════════════════════════════════════════
# QGIS API Documentation Builder - Nightly Build Workflow
# ═══════════════════════════════════════════════════════════════════════════════
#
# Runs nightly to:
# 1. Build and publish master/main branch API docs (always)
# 2. Build docs for all configured releases
# 3. Apply doxygen-awesome theme to all docs
# 4. Push to Cachix
#
# Made with 💗 by Kartoza | https://kartoza.com
#
# ═══════════════════════════════════════════════════════════════════════════════

name: Nightly Docs Build

on:
  # Run nightly at 3am UTC
  schedule:
    - cron: '0 3 * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      force_rebuild_releases:
        description: 'Force rebuild all releases'
        required: false
        default: 'false'
        type: boolean

env:
  CACHIX_CACHE: qgisapidocumentation

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build all configured releases with theme
  # ─────────────────────────────────────────────────────────────────────────────
  build-docs:
    name: Build All Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build themed documentation
        run: |
          echo "Building QGIS API Documentation with doxygen-awesome theme..."
          echo ""
          echo "Note: Nightly builds only process flake-based releases (3.40+)."
          echo "      Legacy releases are built separately via the legacy workflow."
          echo ""

          # Create output directory
          mkdir -p docs-output

          # Build index page
          echo "Building index page..."
          INDEX_PATH=$(nix build .#index --no-link --print-out-paths)
          cp -r "$INDEX_PATH"/* docs-output/
          chmod -R u+w docs-output/

          # Read only flake-based releases (useLegacyBuild = false)
          RELEASES=$(nix eval --raw .#lib.releases --apply 'releases:
            builtins.concatStringsSep "\n" (
              builtins.filter (x: x != "") (
                builtins.map (name:
                  let r = releases.${name};
                  in if r.useLegacyBuild or false then "" else "${r.branch}:${r.version}"
                ) (builtins.attrNames releases)
              )
            )
          ')

          echo "Flake-based releases to build:"
          echo "$RELEASES"
          echo ""

          # Theme injection function
          apply_theme() {
            local version="$1"
            cp theme/doxygen-awesome.css "docs-output/$version/"
            cp theme/doxygen-awesome-sidebar-only.css "docs-output/$version/"
            cp theme/doxygen-awesome-sidebar-only-darkmode-toggle.css "docs-output/$version/"
            cp theme/doxygen-awesome-darkmode-toggle.js "docs-output/$version/"
            cp theme/qgis-theme.css "docs-output/$version/"

            CSS_INJECT='<link rel="stylesheet" href="doxygen-awesome.css"/><link rel="stylesheet" href="doxygen-awesome-sidebar-only.css"/><link rel="stylesheet" href="doxygen-awesome-sidebar-only-darkmode-toggle.css"/><link rel="stylesheet" href="qgis-theme.css"/><script src="doxygen-awesome-darkmode-toggle.js"></script>'

            find "docs-output/$version" -name "*.html" -type f | while read -r html_file; do
              if ! grep -q "doxygen-awesome.css" "$html_file" 2>/dev/null; then
                sed -i "s|</head>|${CSS_INJECT}</head>|" "$html_file"
              fi
            done
          }

          # Build each flake-based release
          while IFS=: read -r branch version; do
            [[ -z "$branch" ]] && continue

            echo ""
            echo "═══════════════════════════════════════════════════════════════"
            echo "Building $version ($branch) [flake]..."
            echo "═══════════════════════════════════════════════════════════════"

            TEMP_DIR=$(mktemp -d)
            cat > "$TEMP_DIR/flake.nix" << EOF
          {
            inputs = {
              nixpkgs.url = "github:NixOS/nixpkgs/nixpkgs-unstable";
              flake-utils.url = "github:numtide/flake-utils";
              qgis.url = "github:qgis/QGIS/$branch";
            };
            outputs = { self, nixpkgs, flake-utils, qgis }:
              flake-utils.lib.eachDefaultSystem (system: {
                packages.default = qgis.packages.\${system}.docs;
              });
          }
          EOF

            if OUT_PATH=$(nix build "$TEMP_DIR#default" --no-link --print-out-paths 2>&1); then
              echo "✓ Built: $OUT_PATH"

              # Copy docs (flatten the master/ subdirectory)
              mkdir -p "docs-output/$version"
              if [[ -d "$OUT_PATH/master" ]]; then
                cp -rL "$OUT_PATH/master"/* "docs-output/$version/" || rsync -a "$OUT_PATH/master/" "docs-output/$version/"
              else
                cp -rL "$OUT_PATH"/* "docs-output/$version/" || rsync -a "$OUT_PATH/" "docs-output/$version/"
              fi
              chmod -R u+w "docs-output/$version"

              echo "Applying theme..."
              apply_theme "$version"
              echo "✓ $version complete with theme"
            else
              echo "✗ Failed to build $version"
            fi

            rm -rf "$TEMP_DIR"

          done <<< "$RELEASES"

          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "Nightly build complete!"
          echo "═══════════════════════════════════════════════════════════════"
          ls -la docs-output/

      - name: Push to Cachix
        run: |
          echo "Pushing built documentation to Cachix..."
          # Push the themed docs derivation
          nix build .#docs --no-link --print-out-paths | cachix push ${{ env.CACHIX_CACHE }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qgis-api-docs
          path: docs-output/
          retention-days: 7

      - name: Summary
        run: |
          echo "# Nightly QGIS API Documentation Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Built Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for dir in docs-output/*/; do
            version=$(basename "$dir")
            echo "- ✓ $version" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Theme" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All documentation styled with:" >> $GITHUB_STEP_SUMMARY
          echo "- [doxygen-awesome-css](https://jothepro.github.io/doxygen-awesome-css/)" >> $GITHUB_STEP_SUMMARY
          echo "- QGIS custom theme" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Cachix" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Docs pushed to: https://${{ env.CACHIX_CACHE }}.cachix.org" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Made with 💗 by [Kartoza](https://kartoza.com)" >> $GITHUB_STEP_SUMMARY
